<footer class="site-footer h-card">
  <data class="u-url" href="{{ "/" | relative_url }}"></data>

  <div class="wrapper">
    <div class="footer-row">
      <span class="p-name">{{ site.author.name | escape }}</span>
      <span class="footer-sep" aria-hidden="true">·</span>
      <a class="u-email" href="mailto:{{ site.author.email }}">{{ site.author.email }}</a>
      {%- if site.github_username -%}
      <span class="footer-sep" aria-hidden="true">·</span>
      <a href="https://github.com/{{ site.github_username }}" rel="me noopener" target="_blank">GitHub</a>
      {%- endif -%}
      {%- if site.linkedin_username -%}
      <span class="footer-sep" aria-hidden="true">·</span>
      <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" rel="me noopener" target="_blank">LinkedIn</a>
      {%- endif -%}
    </div>
  </div>
</footer>
